; Request timeout enforced by Caddy/FrankenPHP at the server layer.
; Keep PHP cap slightly above so transport-level limit fires first.
max_execution_time=15

; opcache/realpath settings
opcache.preload=/var/www/html/config/preload.php
opcache.preload_user=www-data
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
realpath_cache_size=4096K
realpath_cache_ttl=600

; sensible defaults
expose_php=0
memory_limit=768M
post_max_size=32M
upload_max_filesize=32M
opcache.enable=1
opcache.jit=0

; APCu — enable in CLI for warm-cache scripts (worker bootstrap, console)
apc.enable_cli=1